name: Package and Release RAM

on:
  push:
    tags:
      - 'v*' # Triggers automatically when you push a tag starting with 'v', e.g. v1.0.0
  workflow_dispatch: # Allows manual trigger from the Actions tab on GitHub

permissions:
  contents: write

jobs:
  build-and-release:
    name: Build on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            artifact_name: RAM.exe
            release_file: RAM_Windows.zip
          - os: macos-latest
            artifact_name: RAM
            release_file: RAM_macOS.zip
          - os: ubuntu-latest
            artifact_name: RAM
            release_file: RAM_Linux.tar.gz

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pymupdf openpyxl pandas pypdf python-docx rapidfuzz pillow pyinstaller

      - name: Build with PyInstaller (Windows)
        if: matrix.os == 'windows-latest'
        run: |
          pyinstaller --onefile --noconsole --paths=. --add-data "docs;docs" --add-data "logo.ico;." --icon=logo.ico --name "RAM" ram.py
          powershell Compress-Archive -Path dist/RAM.exe -DestinationPath RAM_Windows.zip

      - name: Build with PyInstaller (macOS)
        if: matrix.os == 'macos-latest'
        run: |
          pyinstaller --onefile --windowed --paths=. --add-data "docs:docs" --add-data "logo.ico:." --icon=logo.ico --name "RAM" ram.py
          cd dist
          zip -r ../RAM_macOS.zip RAM.app
          cd ..

      - name: Build with PyInstaller (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: |
          pyinstaller --onefile --paths=. --add-data "docs:docs" --add-data "logo.ico:." --name "RAM" ram.py
          tar -czf RAM_Linux.tar.gz -C dist RAM

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.os }}-build
          path: ${{ matrix.release_file }}

  create-release:
    name: Create GitHub Release
    needs: build-and-release
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - name: Download all build artifacts
        uses: actions/download-artifact@v4

      - name: Create Release and Upload Assets
        uses: softprops/action-gh-release@v2
        with:
          files: |
            **/*.zip
            **/*.tar.gz
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}